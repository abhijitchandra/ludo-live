<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Live - Enterprise P2P Edition</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/themes.css">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js" defer></script>
    <script type="module" src="assets/js/app.js" defer></script>
</head>
<body>
    <div class="enterprise-wrapper">
        <header class="app-header">
            <h1>🎲 Ludo Live <span class="badge">Enterprise P2P</span></h1>
            <button id="btn-theme-toggle" class="btn btn-secondary" aria-label="Toggle High Contrast Display Mode">Toggle UI Theme</button>
        </header>

        <main class="grid-container">
            <section class="card network-card">
                <h2>Network Control Unit</h2>
                <div class="control-row" id="host-actions">
                    <button id="btn-host-match" class="btn btn-primary">Initialize Hosted Instance</button>
                </div>
                <div id="invite-share-module" class="hidden">
                    <label for="input-invite-link">Shareable Connection String:</label>
                    <div class="input-group">
                        <input type="text" id="input-invite-link" readonly>
                        <button id="btn-copy-link" class="btn btn-accent">Copy URI</button>
                    </div>
                </div>
            </section>

            <section class="card status-card">
                <h2>Telemetry & Rules Engine</h2>
                <div class="status-grid">
                    <div class="status-item">Local Node Profile: <span id="telemetry-role" class="text-bold">Unassigned</span></div>
                    <div class="status-item">Engine Sequence State: <span id="telemetry-turn" class="text-bold">Awaiting Peer Sync</span></div>
                </div>
                <div class="dice-deck">
                    <div id="dice-matrix-view" class="dice-face">1</div>
                    <button id="btn-trigger-roll" class="btn btn-success" disabled>Execute Move Sequence</button>
                </div>
            </section>

            <section class="card board-viewport">
                <div class="ludo-board-matrix" id="ludo-board-dom">
                    </div>
            </section>

            <section class="card telemetry-logs">
                <h2>Event Telemetry Stream</h2>
                <div id="sys-log-stream" class="terminal-stream">> Kernel initialization complete. System idle...</div>
            </section>
        </main>
    </div>
</body>
</html>
